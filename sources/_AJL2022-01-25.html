				renderer.shadowMap.enabled = true;

				// stats

				stats = new Stats();
				container.appendChild( stats.dom );

                // OrbitControls
				const controls = new OrbitControls( camera, renderer.domElement );
				controls.minDistance = 1;
				controls.maxDistance = 10000;

				//addEventListener
				window.addEventListener( 'resize', onWindowResize );

				
				//Button New Sundial
				button = document.createElement( 'button' );
			    button.innerHTML ='New Sundial';

			    menu.appendChild( button );
				//button.addEventListener( 'click', run() );  NEW SUNDIAL
				  button.addEventListener("click", function() {

                csgroup = new THREE.Group();
                posGnomon = new THREE.Vector3( );
                heuresSolairesGroup=new THREE.Group();
                const heuresSolairesMaterial = new THREE.MeshLambertMaterial( { color: 0xff00ff } );
                heuresSolairesListeMesh=[]

// --------------------------------------------------------------------------------------------------------
function pointDansCadran(x,y)
{
	return ((Math.abs(x)<=(cs.largeur/2))&&(Math.abs(y)<=(cs.hauteur/2))) 
}
//---------------------------------------------------------------------------------------------------------
function TracerHeuresSolaires ()
{
let tubeGeometry,mesh,xp,yp,zp,lm,pipeSpline,pipeSplineCRC;
   
   lm=heuresSolairesListeMesh.length;
  
   for (let i = 0; i < lm; i++){
   	                mesh = heuresSolairesListeMesh[ i ];
					heuresSolairesGroup.remove(mesh);
					//mesh.dispose();
					//heuresSolairesListeMesh.pop()
					}
   heuresSolairesListeMesh=[];
   csgroup.remove(heuresSolairesGroup);
   //animate();
//    lm=listeMesh.length;
//    console.log(lm);
//    console.log(listeMesh);
   const sunDial=SUNDIAL.general(toRad(cs.lati),toRad(cs.decli),cs.hgnomon,toRad(cs.incli));
//   console.log(sunDial);
   for (let i = 0; i < sunDial.lines.length; i++) {
   		if (sunDial.lines[i].points.length>1) {
   			 
			 pipeSpline = [];
			 for (let p = 0; p < sunDial.lines[i].points.length; p++){
			 	xp=sunDial.lines[i].points[p].x+cs.xgnomon;
   			    yp=sunDial.lines[i].points[p].y+cs.ygnomon;
   			    zp=cs.epaisseur;
				if (pointDansCadran(xp,yp)){pipeSpline.push(new THREE.Vector3(xp,yp,zp))}
				};
				
				if (pipeSpline.length>1) {
				   pipeSplineCRC=[];
				   pipeSplineCRC = new THREE.CatmullRomCurve3(pipeSpline);
				   //const points = pipeSplineCRC.getPoints( 32 );
				   tubeGeometry = new THREE.TubeGeometry( pipeSplineCRC, 16, 2,8 );
				   mesh = new THREE.Mesh( tubeGeometry, heuresSolairesMaterial);
				   heuresSolairesListeMesh.push(mesh);
				   // mesh.parent=gnomon; 
				   heuresSolairesGroup.add(mesh);
				}
   		}
   	} 
  csgroup.add(heuresSolairesGroup); 
}
			
//-----------------------------------------------------------------------------------------------------
function loadJsonFile() 
{
//  const content = document.querySelector('.content');
  const [file] = document.querySelector('input[type=file]').files;
//   const docinput = document.querySelector('input');
//   docinput.style.opacity = 0;
  
  const reader = new FileReader();
  reader.addEventListener("load", () => 
    {
    cs.export="?";
    cs=JSON.parse(reader.result); 
    console.log(JSON.stringify(cs,null,1));
    
//     document.getElementById("fileinput").disabled = 'true';
//     button.innerHTML = "";
//     button.disabled=true;
    run();
    }, false);
  if (file) 
   {
    reader.readAsText(file);
   }
   
   return reader.result;
  

}

            //function saveString
            //saveString('uih uihgb iuo huipo','Bidon.txt');
			const link = document.createElement( 'a' );
			link.style.display = 'none';
			document.body.appendChild( link ); // Firefox workaround, see #6594
			function save( blob, filename ) {
						link.href = URL.createObjectURL( blob );
						link.download = filename;
						link.click();}
			function saveString( text, filename ) {			       
               save( new Blob( [ text ], { type: 'text/plain' } ), filename );
			}
				
// ---------------------------------------------------------------------------------------------------
  function 	eulerCsGroup() 
  {
  	const a = new THREE.Euler( (cs.incli-90)/180*Math.PI, cs.decli/180*Math.PI,cs.rot/180*Math.PI, 'YXZ' );
	csgroup.setRotationFromEuler(a); 	
  }

//---------------------------------------------------------------------------------------------------------
			function init() {
		

                //Effacement de toute la page d'introduction

		document.getElementById("info").style.display = "none";		

				// dat.GUI ///////////////////////////////////////////////////////////////////////////////////////

				
	    const gui = new GUI( { width: Math.round(window.innerWidth/2) } );
              
                  	
               
		   const folderGeometry = gui.addFolder( 'Sundial...' );
				folderGeometry.add( cs, "largeur", 10, 1000 ).name("Width")
				  .onChange(function(v){
					cs.largeur=v; cube.scale.x=cs.largeur})
				  .onFinishChange(function(){csgroup.remove(cs.heuresSolairesGroup);TracerHeuresSolaires() });
				folderGeometry.add( cs, "hauteur", 10, 1000, 0.1 ).name("Height").onChange(function(v){
					cs.hauteur=v;
					cube.scale.y=cs.hauteur; 
				});
				folderGeometry.add( cs, "epaisseur", 10, 1000, 0.1 ).name("Depth").onChange(function(v){
					cs.epaisseur=v;
					cube.scale.z=cs.epaisseur; 
					gnomon.position.z=(cs.hgnomon+cs.epaisseur)/2 ; 
				}); 
				folderGeometry.add( cs, "decli", -180, 180, 0.1 ).name("Declinaison").onChange(function(v){
					cs.decli=v;
					eulerCsGroup()   
				}); 
				folderGeometry.add( cs, "incli", -180, 180, 0.1 ).name("Inclinaison")
				    .onChange(function(v){
				            	cs.incli=v;
					         eulerCsGroup() })
				    .onFinishChange(function(v){});
                folderGeometry.add( cs, "rot", -180, 180, 0.1 ).name("Rotation").onChange(function(v){
					cs.rot=v;
					eulerCsGroup() 
				});
                
              
           var materialCS = new THREE.MeshPhongMaterial();                
               materialCS.color.setStyle(cs.colorCS); 
               materialCS.emissive.setStyle(cs.emissiveCS); 
               materialCS.specular.setStyle(cs.specularCS); 

           var controlCS = new function () {
						this.color = materialCS.color.getStyle();
						this.emissive = materialCS.emissive.getStyle();
						this.specular = materialCS.specular.getStyle();};
              
           var spGui = folderGeometry.addFolder("Colors...");
              
              spGui.addColor(controlCS, 'color').name('reflection').onChange(function (e) {
                   materialCS.color = new THREE.Color(e);
                   cs.colorCS=materialCS.color.getStyle();
                   });
           
              spGui.addColor(controlCS, 'emissive').name('emition').onChange(function (e) {
                   materialCS.emissive = new THREE.Color(e);
                   cs.emissiveCS=materialCS.emissive.getStyle();
                   });
              spGui.addColor(controlCS, 'specular').onChange(function (e) {
                   materialCS.specular = new THREE.Color(e);
                   cs.specularCS=materialCS.specular.getStyle();
                   });
              spGui.add(materialCS, 'shininess', 0, 100, )
              
               
              spGui.add(cs,'opaciteCS',0,100,1).name('opacity % ').onChange(function(e){
              	if (e<100) 
              	               {materialCS.transparent=true;
              	               cs.opaciteCS=e;
                               materialCS.opacity=e/100;} else {materialCS.transparent=false}
                });
              spGui.add(materialCS, 'wireframe');
           

                const gnomongGy=gui.addFolder('Straight style...')
				gnomongGy.add( cs, "hgnomon", 10, 1000, 0.1 ).name("Length").onChange( function (e) {
                    cs.hgnomon=e;
                    gnomon.scale.y=cs.hgnomon;
                    gnomon.position.z=(cs.hgnomon+cs.epaisseur)/2 ;
				});
				gnomongGy.add( cs, "egnomon", 1, 100, 0.1 ).name("Thickness").onChange( function (e) {
					cs.egnomon=e;
					gnomon.scale.x=cs.egnomon;
					gnomon.scale.z=cs.egnomon;
				});
				gnomongGy.add( cs, "xgnomon", -1000, 1000, 0.1 ).name(">").onChange( function (e) {
					cs.xgnomon=e;
					gnomon.position.x=cs.xgnomon; });
				gnomongGy.add( cs, "ygnomon", -1000, 1000, 0.1 ).name("^").onChange( function (e ) {
					cs.ygnomon=e;gnomon.position.y=cs.ygnomon;
				});

			   const folderHours = gui.addFolder( 'Hours...' ); 
			      const folderSolarHours=folderHours.addFolder('Solars hours...');
			            folderSolarHours.add(cs,'heuresSolaires').name('Trace').onChange( function  (e){
			            	cs.heuresSolaires=e;
			            	if (e) {TracerHeuresSolaires()}else{csgroup.remove(heuresSolairesGroup)}
			            });

			   const folderArcs=   gui.addFolder( 'Arcs, equinoxes and solstices' ); 

               const folderFiles = gui.addFolder( 'Save sundial, scene, 3D files...' ); 
                cs.export="?";
                folderFiles.add(cs,"nameFile").name("File name").onChange( function  (e) {
                	cs.nameFile=e;
                	});
                folderFiles.add(cs,"export",["?","Sundial(JSON)","Scene(JSON)","Spreadsheet (CSV)","3D (STL)"]).name("Save").onChange( function  (e) 
                   {
                	if (e=="Sundial(JSON)") 
                               	  {saveString(JSON.stringify(cs,null,2),cs.nameFile+'.sundial.json' )                          	                       	  
                               	  };
                    if (e=="Scene(JSON)")
                	              {saveString(JSON.stringify(scene.toJSON(),null,2),cs.nameFile+'.scene.json')};
                	});
					         

              //generateGeometry;           

              geometryCS = new THREE.BoxGeometry(1,1,1);	
             
			  cube = new THREE.Mesh( geometryCS, materialCS ); 
			  cube.scale.x=cs.largeur; 
			  cube.scale.y=cs.hauteur; 
			  cube.scale.z=cs.epaisseur;
			  cube.receiveShadow = true;


               const geometryGnomon = new THREE.CylinderGeometry( 1, 1, 1, 16 );
               const materialGnomon = new THREE.MeshBasicMaterial( {color: 0xffffff} );
               gnomon = new THREE.Mesh( geometryGnomon, materialGnomon );  
               //cube.add(gnomon);
               gnomon.position.x=cs.xgnomon; 
               gnomon.position.y=cs.ygnomon;
               gnomon.position.z=(cs.hgnomon+cs.epaisseur)/2 ; 
               gnomon.scale.y=cs.hgnomon;
               gnomon.scale.x=cs.egnomon;
			   gnomon.scale.z=cs.egnomon;
               gnomon.rotation.x = Math.PI*0.5;
               gnomon.castShadow = true; //default is false

               
               
			//	csgroup 
				csgroup.add( cube );
				csgroup.add( gnomon );
				
				if (cs.heuresSolaires==true)  {TracerHeuresSolaires()};
				scene.add( csgroup );
				eulerCsGroup();

             

             // helpers 
                const axesHelper = new THREE.AxesHelper( Math.max(cs.largeur,cs.hauteur,cs.epaisseur) );
                scene.add(axesHelper);
				const camHelper = new THREE.CameraHelper( light.shadow.camera );
               // scene.add( camHelper );
			   
           
			}//init



			
//---------------------------------------------------------------------------------------------------------

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
                renderer.setSize( window.innerWidth, window.innerHeight );

			}

			//

			function animate() {

				requestAnimationFrame( animate );
                //csgroup.rotation.y +=0.01;

				render();
				stats.update();

			}

			//

			function render() {
				
				renderer.render( scene,camera );

			}
